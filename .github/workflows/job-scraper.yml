name: Job Scraper

on:
  schedule:
    # Runs every 2 hours. Adjust cron as needed:
    # Every hour:    "0 * * * *"
    # Every 2 hours: "0 */2 * * *"
    # Nightly 7am UTC (midnight PT): "0 7 * * *"
    - cron: "0 */2 * * *"

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit seen_jobs.json back to the repo

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest

      - name: Run tests
        run: pytest tests/ -v

      - name: Run scraper
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          NOTION_TOKEN:        ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID:  ${{ secrets.NOTION_DATABASE_ID }}
        run: python scraper.py

      - name: Commit updated seen_jobs.json
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen_jobs.json
          # Only commit if seen_jobs.json actually changed
          git diff --staged --quiet || git commit -m "chore: update seen_jobs [skip ci]"
          git push